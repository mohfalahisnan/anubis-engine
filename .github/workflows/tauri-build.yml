name: "Release"

on:
  push:
    branches:
      - main
  # You can trigger this manually from the Actions tab
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon only — ort-sys (used by fastembed) doesn't ship
          # prebuilt ONNX Runtime binaries for x86_64-apple-darwin anymore.
          # If Intel Mac support becomes important, switch the embedder to
          # ort-tract (pure Rust) or build ORT from source in CI.
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install NPM dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Anubis OS v__VERSION__"
          releaseBody: "Automated build of Anubis OS"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
