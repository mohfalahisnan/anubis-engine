# Speeds up linking on Windows MSVC by routing through rust-lld (ships with
# the Rustup toolchain — no install needed). On this project's scale link.exe
# spends 30–60s on the final binary; rust-lld typically does it in a few.
#
# NOTE: this path is user-specific. If your toolchain lives elsewhere, run:
#   rustup which rust-lld
# and substitute. Adjust the toolchain name (stable-x86_64-pc-windows-msvc)
# if you're on a different host triple.
[target.x86_64-pc-windows-msvc]
linker = "C:\\Users\\User\\.rustup\\toolchains\\stable-x86_64-pc-windows-msvc\\lib\\rustlib\\x86_64-pc-windows-msvc\\bin\\rust-lld.exe"
